name: CMake on multiple platforms

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: windows-latest
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl

    steps:
    - uses: actions/checkout@v4

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"
        echo "vcpkg-downloads-dir=${{ github.workspace }}/vcpkg_downloads" >> "$GITHUB_OUTPUT"

    # Step 1: Install Ninja (required since you specified -G Ninja earlier)
    - name: Install Ninja
      uses: wheelsandbytes/setup-ninja@v1

    # Step 2: Configure Github Cache for vcpkg binary artifacts
    - name: Cache vcpkg binaries
      uses: actions/cache@v4
      with:
        path: ${{ steps.strings.outputs.vcpkg-downloads-dir }}
        # The cache key changes if you change your source code dependencies 
        # (Assuming you use a vcpkg.json manifest file or similar)
        key: ${{ runner.os }}-${{ matrix.c_compiler }}-vcpkg-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.c_compiler }}-vcpkg-

    # Step 3: Setup vcpkg and point its internal binary storage to our cached directory
    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: 'latest'
      env:
        # Forces vcpkg to read/write binaries inside our tracked GitHub Cache path
        VCPKG_DEFAULT_BINARY_CACHE: ${{ steps.strings.outputs.vcpkg-downloads-dir }}

    # Step 4: Configure CMake with Ninja and your VCPKG Toolchain file
    - name: Configure CMake
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -G Ninja
        -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -S ${{ github.workspace }}
      env:
        VCPKG_DEFAULT_BINARY_CACHE: ${{ steps.strings.outputs.vcpkg-downloads-dir }}

    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: ctest --build-config ${{ matrix.build_type }}
